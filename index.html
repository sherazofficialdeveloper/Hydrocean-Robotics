<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch || (typeof globalThis !== 'undefined' ? globalThis.fetch : null);
          if (originalFetch) {
            let currentFetch = originalFetch;
            const descriptor = {
              get() {
                return currentFetch;
              },
              set(value) {
                currentFetch = value;
              },
              configurable: true,
              enumerable: true
            };
            Object.defineProperty(window, 'fetch', descriptor);
            if (typeof globalThis !== 'undefined' && globalThis !== window) {
              Object.defineProperty(globalThis, 'fetch', descriptor);
            }
          }
        } catch (e) {
          console.warn('Unable to define writable fetch descriptor:', e);
        }
      })();
    </script>
